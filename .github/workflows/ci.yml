name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: scripts/setup.py

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pandoc \
            calibre \
            libegl1 libopengl0 libxkbcommon0 libfontconfig1 \
            libxcb-cursor0 libxcb-xkb1 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 \
            libxcb-xinput0 libxcb-xv0 libxcb-composite0 libxcb-damage0 \
            libxcb-dpms0 libxcb-glx0 libxcb-record0 libxcb-scrnsaver0 \
            libxcb-util1 libxcb-xf86dri0 libxcb-xevie0 libxcb-xf86vidmode0 \
            libxcb-xprint0 libxcb-xselinux0 libxcb-xtest0 libxcb-xv0 \
            libxcb-xvmc0
          echo "=== Versions ==="
          ebook-convert --version 2>/dev/null || echo "calibre not installed via apt, trying official installer..."
          if ! command -v ebook-convert &>/dev/null; then
            wget -qO- https://download.calibre-ebook.com/linux-installer.sh | sudo sh /dev/stdin
          fi
          ebook-convert --version
          pandoc --version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypandoc beautifulsoup4

      - name: Run tests
        run: python -m unittest discover tests/ -v

      - name: Full setup.py verification
        run: python scripts/setup.py
